name: Secrets Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  secrets:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Gitleaks secrets scan
        uses: gitleaks/gitleaks-action@v2
        with:
          arguments: --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_REF: ${{ github.ref }}
