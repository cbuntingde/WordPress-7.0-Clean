name: PHP Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Lint PHP files
        run: |
          find . -name '*.php' -type f \
            ! -path './wp-includes/sodium_compat/*' \
            ! -path './wp-content/themes/*' \
            ! -path './wp-content/plugins/*' \
            ! -path './.git/*' \
            -exec php -l {} \; | grep -v "No syntax errors detected" && exit 1 || true