name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight
  workflow_dispatch:  # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.repository != 'WordPress/WordPress'

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/WordPress/WordPress.git
          git fetch upstream

      - name: Create merge branch
        run: |
          git config user.name 'GitHub Actions'
          git config user.email 'actions@github.com'
          echo "BRANCH_NAME=sync-upstream-$(date +%Y%m%d)" >> $GITHUB_ENV
          git checkout -b sync-upstream-$(date +%Y%m%d) upstream/master
          git merge master --no-edit || true

      - name: Create PR
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const branchName = process.env.BRANCH_NAME;
            const { repo, owner } = context.repo;
            const pr = await github.rest.pulls.create({
              owner: owner,
              repo: repo,
              title: 'Sync: Merge upstream WordPress changes',
              body: 'Automated PR to sync with upstream WordPress/master',
              head: branchName,
              base: 'master',
            });
            console.log(`Created PR #${pr.data.number}`);